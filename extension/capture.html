<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Screenshot Mode</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24'><line x1='12' y1='0' x2='12' y2='24' stroke='%23667eea' stroke-width='3'/><line x1='0' y1='12' x2='24' y2='12' stroke='%23667eea' stroke-width='3'/></svg>") 12 12, crosshair;
            user-select: none;
        }
        
        #screenshot-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 999999;
        }
        
        .toolbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            gap: 10px;
            z-index: 1000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            align-items: center;
        }
        
        .toolbar button {
            background: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .toolbar button:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }
        
        .toolbar .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .toolbar .btn-primary:hover {
            background: #5a67d8;
        }
        
        .toolbar .btn-danger {
            background: #e53e3e;
            color: white;
        }
        
        .toolbar .btn-danger:hover {
            background: #c53030;
        }
        
        #instruction {
            color: white;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span id="instruction">📸 Drag to select area, then click "Capture"</span>
        <button class="btn-primary" id="captureBtn" disabled>Capture</button>
        <button class="btn-danger" id="cancelBtn">Cancel (ESC)</button>
    </div>
    
    <canvas id="screenshot-canvas"></canvas>
    
    <script src="capture.js"></script>
</body>
</html>
