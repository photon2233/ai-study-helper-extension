<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Helper</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            width: 500px; 
            height: 650px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            color: white;
        }
        
        .header h2 { 
            font-size: 18px; 
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .container {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .config-bar {
            display: flex;
            gap: 8px;
            padding: 12px 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #e2e8f0;
        }
        
        select {
            flex: 1;
            padding: 8px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: white;
            scroll-behavior: smooth;
        }
        
        .message {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            max-width: 85%;
            line-height: 1.5;
            font-size: 13px;
            word-wrap: break-word;
        }
        
        .user-message {
            background: #667eea;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }
        
        .assistant-message {
            background: #f1f5f9;
            color: #1e293b;
            white-space: pre-wrap;
            border-bottom-left-radius: 2px;
        }
        
        .message-image {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 8px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        .input-area {
            padding: 12px 15px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        #question {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e0;
            border-radius: 8px;
            font-size: 13px;
            resize: none;
            max-height: 100px;
        }
        
        #question:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 6px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: #f7fafc;
            border-color: #667eea;
        }
        
        #btn {
            padding: 0 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 13px;
        }
        
        #btn:hover:not(:disabled) {
            background: #5a67d8;
        }
        
        #btn:disabled {
            background: #cbd5e0;
            cursor: wait;
        }
        
        .image-preview {
            display: none;
            padding: 8px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px dashed #cbd5e0;
        }
        
        .preview-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .preview-img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }
        
        .preview-info {
            flex: 1;
            font-size: 12px;
            color: #4a5568;
        }
        
        .remove-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            padding: 8px 15px;
            background: #f8f9fa;
            font-size: 11px;
            color: #666;
            justify-content: space-between;
            align-items: center;
        }
        
        .link-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            font-size: 11px;
        }
        
        #imageInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>🤖 AI Study Helper Pro</h2>
    </div>

    <div class="container">
        <div class="config-bar">
            <select id="modelSelect">
                <option value="gemini-2.5-flash">🚀 Gemini 2.5 Flash</option>
                <option value="gemini-2.5-flash-lite">⚡ Gemini 2.5 Flash Lite</option>
                <option value="gemma-3-27b-it">🐢 Gemma 3 27B</option>
            </select>

            <select id="modeSelect">
                <option value="default">💬 Free Chat</option>
                <option value="solver">🧮 Problem Solver</option>
                <option value="explainer">📖 Explainer</option>
            </select>
        </div>

        <div class="chat-container" id="chatContainer"></div>
        
        <div class="input-area">
            <div class="image-preview" id="imagePreview">
                <div class="preview-content">
                    <img id="previewImg" class="preview-img" alt="Preview">
                    <div class="preview-info">
                        <div id="imageInfo">Image attached</div>
                    </div>
                    <button class="remove-btn" id="removeBtn">✕ Remove</button>
                </div>
            </div>
            
            <div class="input-row">
                <textarea id="question" 
                       rows="2"
                       placeholder="Ask anything or attach an image..."></textarea>
                
                <div class="button-group">
                    <button class="icon-btn" id="uploadBtn" title="Upload image">
                        📎
                    </button>
                    <button class="icon-btn" id="screenshotBtn" title="Screenshot">
                        📸
                    </button>
                    <button id="btn">Send</button>
                </div>
            </div>
            <input type="file" id="imageInput" accept="image/*">
        </div>
        
        <div class="controls">
            <div>
                <button class="link-btn" id="exportBtn">Export</button>
                <span>•</span>
                <button class="link-btn" id="clearBtn">Clear</button>
            </div>
            <span id="status">Ready</span>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
