<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Helper</title>
    <style>
        #answer {
            white-space: pre-wrap; 
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <h3>AI Study Helper - Day 2</h3>
    <input type="text" id="question" placeholder="Enter a question (e.g. Explain the photoelectric effect)" style="width:400px; padding: 10px;"/>
    <button id="btn" onclick="ask()" style="padding: 10px 20px; cursor: pointer;">Ask</button>

    <div id="answer">Waiting for a question...</div>

    <script>
        async function ask() {
            const q = document.getElementById("question").value;
            const answerDiv = document.getElementById("answer");
            const btn = document.getElementById("btn");

            if (!q) return alert("Please enter a question!");

            btn.disabled = true;
            answerDiv.innerText = "Thinking... 🧠";

            try {
                const res = await fetch("http://127.0.0.1:8000/ask", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ text: q })
                });

                if (!res.ok) throw new Error("Backend response error");

                const data = await res.json();
                answerDiv.innerText = data.answer;
            } catch (err) {
                answerDiv.innerText = "An error occurred: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
