<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Helper (Pro)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; color: #333; }
        .container { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 90vh; }
        
        /* Header & Config */
        header { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        h3 { margin: 0 0 15px 0; color: #2d3748; display: flex; align-items: center; gap: 10px; }
        .config-bar { display: flex; gap: 10px; flex-wrap: wrap; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; flex: 1; cursor: pointer; outline: none; }
        select:focus { border-color: #667eea; }

        /* Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 15px; border: 1px solid #e2e8f0; border-radius: 12px; background: #fff; margin-bottom: 20px; scroll-behavior: smooth; }
        .message { margin-bottom: 16px; padding: 12px 18px; border-radius: 12px; max-width: 85%; line-height: 1.6; word-wrap: break-word; }
        .user-message { background: #667eea; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .assistant-message { background: #f1f5f9; color: #1e293b; margin-right: auto; border-bottom-left-radius: 2px; white-space: pre-wrap; }
        
        /* Input Area */
        .input-area { display: flex; gap: 10px; margin-top: auto; }
        #question { flex: 1; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; transition: border 0.2s; }
        #question:focus { outline: none; border-color: #667eea; }
        #btn { padding: 0 30px; background: #667eea; color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        #btn:hover:not(:disabled) { background: #5a67d8; }
        #btn:disabled { background: #cbd5e0; cursor: wait; }

        /* Controls */
        .controls { display: flex; gap: 10px; margin-top: 15px; font-size: 12px; color: #666; align-items: center; }
        .link-btn { background: none; border: none; color: #667eea; cursor: pointer; padding: 0; text-decoration: underline; }
        .link-btn:hover { color: #5a67d8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h3>🤖 AI Study Helper</h3>
            <div class="config-bar">
                <select id="modelSelect">
                    <option value="gemini-2.5-flash">🚀 Gemini 2.5 Flash (Recommended)</option>
                    <option value="gemini-2.5-flash-lite">⚡ gemini 2.5 flash lite</option>
                    <option value="gemma-3-27b-it">🐢 Gemma 3 27B (Open Model)</option>
                </select>

                <select id="modeSelect" onchange="updatePlaceholder()">
                    <option value="default">💬 Free Chat</option>
                    <option value="solver">🧮 Problem Solver</option>
                    <option value="explainer">📖 Textbook Explainer</option>
                </select>
            </div>
        </header>

        <div class="chat-container" id="chatContainer"></div>
        
        <div class="input-area">
            <input type="text" id="question" 
                   placeholder="Type your question..."
                   autocomplete="off"
                   onkeypress="if(event.key === 'Enter') ask()">
            <button id="btn" onclick="ask()">Send</button>
        </div>
        
        <div class="controls">
            <button class="link-btn" onclick="exportChat()">📥 Export Chat</button>
            <span>•</span>
            <button class="link-btn" onclick="clearChat()">Clear History</button>
            <span>•</span>
            <button class="link-btn" onclick="clearAllData()">Reset All</button>
            <span style="margin-left: auto" id="status">Ready</span>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'ai_study_v2_history';
        let messages = [];

        const PLACEHOLDERS = {
            default: "Ask me anything...",
            solver: "Paste your math/physics problem here...",
            explainer: "Paste the textbook content you want explained..."
        };

        function updatePlaceholder() {
            const mode = document.getElementById("modeSelect").value;
            document.getElementById("question").placeholder = PLACEHOLDERS[mode] || "Type your message...";
        }

        async function ask() {
            const input = document.getElementById("question");
            const q = input.value.trim();
            if (!q) return;


            const modelName = document.getElementById("modelSelect").value;
            const promptId = document.getElementById("modeSelect").value;

            messages.push({ role: "user", content: q });
            renderMessage("user", q);
            saveHistory();
            
            input.value = "";
            setLoading(true);

            try {
                const res = await fetch("http://127.0.0.1:8000/chat_stream", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        messages: messages, 
                        model_name: modelName,
                        prompt_id: promptId 
                    })
                });

                if (!res.ok) throw new Error(`API Error: ${res.status}`);

              
                const assistantMsg = createMessageElement("assistant", ""); 
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    assistantMsg.textContent = fullText;
                    scrollToBottom();
                }

              
                messages.push({ role: "assistant", content: fullText });
                saveHistory();

            } catch (err) {
                alert("Error: " + err.message);
                renderMessage("assistant", "❌ Error: " + err.message);
            } finally {
                setLoading(false);
            }
        }

      

        function renderMessage(role, text) {
            const el = createMessageElement(role, text);
            scrollToBottom();
            return el;
        }

        function createMessageElement(role, text) {
            const container = document.getElementById("chatContainer");
            const div = document.createElement("div");
            div.className = `message ${role === 'user' ? 'user-message' : 'assistant-message'}`;
            div.textContent = text;
            container.appendChild(div);
            return div;
        }

        function scrollToBottom() {
            const c = document.getElementById("chatContainer");
            c.scrollTop = c.scrollHeight;
        }

        function setLoading(isLoading) {
            document.getElementById("btn").disabled = isLoading;
            document.getElementById("status").textContent = isLoading ? "Generating..." : "Ready";
        }

        function saveHistory() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        function loadHistory() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                messages = JSON.parse(saved);
                messages.forEach(m => renderMessage(m.role, m.content));
            }
        }

        function clearChat() {
            messages = [];
            document.getElementById("chatContainer").innerHTML = "";
            saveHistory();
        }

        function clearAllData() {
            if(confirm("Delete all saved data?")) {
                localStorage.removeItem(STORAGE_KEY);
                location.reload();
            }
        }

        function exportChat() {
            if (messages.length === 0) {
                return alert("No conversation to export!");
            }

         
            let content = "# AI Study Helper - Chat History\n\n";1
            content += `Date: ${new Date().toLocaleString()}\n`;
            content += "----------------------------------------\n\n";

            messages.forEach(msg => {
                const roleName = msg.role === 'user' ? '👤 User' : '🤖 AI';
                content += `### ${roleName}:\n${msg.content}\n\n`;
                content += "---\n\n";
            });

         
            const blob = new Blob([content], { type: "text/markdown;charset=utf-8" });

            
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            
            const timestamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
            a.download = `study-chat-${timestamp}.md`;
            
            document.body.appendChild(a);
            a.click();
            
           
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

      
        window.addEventListener('DOMContentLoaded', () => {
            loadHistory();
            updatePlaceholder();
        });
    </script>
</body>
</html>
